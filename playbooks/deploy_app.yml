# Playbook: deploy_app.yml
# Purpose: Builds an app container using Podman and deploys to K3s.
# Requirements:
#   - Variable 'app_name' must match a folder in /apps/
#   - Control node must have Podman installed.
#   - App directory in /apps/ must have k8s.yml.j2 deployment manifest in root
# Target: Localhost (Build) -> K3s_Servers (Deploy)
- name: Pre-flight App Validation
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Ensure app_name variable is provided
      ansible.builtin.fail:
        msg: "Error: 'app_name' variable is missing. Run with: -e 'app_name=your_app'"
      when: app_name is undefined or app_name | length == 0

    - name: Verify app directory exists
      ansible.builtin.stat:
        path: "{{ project_root }}/apps/{{ app_name }}"
      register: app_dir

    - name: Fail if app directory is missing
      ansible.builtin.fail:
        msg: "Error: App folder '{{ project_root }}/apps/{{ app_name }}' not found."
      when: not app_dir.stat.exists or not app_dir.stat.isdir

- name: Deploy app
  hosts: localhost
  gather_facts: true
  vars_files:
    - "{{ project_root }}/vault.yml"
    - "{{ project_root }}/apps/{{ app_name }}/vault.yml"
    - "{{ project_root }}/apps/{{ app_name }}/vault.yml"
  tasks:
    - name: Run deployment
      ansible.builtin.include_tasks: deploy_app_tasks.yml
