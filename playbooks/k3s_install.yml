- name: Common K3s Node Prep
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Install system dependencies
      ansible.builtin.package:
        name: [curl, python3-pip, python3-kubernetes, python3-yaml]
        state: present

    - name: Pre-configure Registry Trust
      block:
        - name: Ensure K3s config directory exists
          ansible.builtin.file:
            path: /etc/rancher/k3s
            state: directory
            mode: '0755'

        - name: Configure K3s registries.yaml
          ansible.builtin.template:
            src: registries.yml.j2
            dest: /etc/rancher/k3s/registries.yaml
            owner: root
            group: root
            mode: '0644'

    - name: System optimizations (disable Swap/UFW)
      block:
        - name: Disable UFW if installed
          community.general.ufw:
            state: disabled
          changed_when: ufw_status.changed == true and ufw_status.state == "disabled"
          when: ansible_facts.packages['ufw'] is defined
          # alternatively keeping ufw enabled we need to open these ports
          # ufw allow 6443/tcp #apiserver
          # ufw allow from 10.42.0.0/16 to any #pods
          # ufw allow from 10.43.0.0/16 to any #services

        - name: Remove swap from fstab
          ansible.posix.mount:
            name: none
            fstype: swap
            state: absent

        - name: Disable swap immediately
          ansible.builtin.command: /usr/sbin/swapoff -a
          when: ansible_swaptotal_mb > 0
          changed_when: true

- name: Install K3s Server
  hosts: k3s_servers
  become: true
  tasks:
    - name: K3s installation
      block:
        - name: Install K3s server (only on the first host)
          ansible.builtin.shell: |
            set -o pipefail
            curl -sfL https://get.k3s.io | \
            INSTALL_K3S_EXEC="server --node-ip=$(tailscale ip -4) --flannel-iface=tailscale0" \
            K3S_KUBECONFIG_MODE="600" sh -s -
          args:
            executable: /bin/bash
            creates: /etc/systemd/system/k3s.service

- name: Install K3s Agents
  hosts: k3s_agents
  become: true
  tasks:
    - name: Get token from Server
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_base64
      delegate_to: "{{ groups['k3s_servers'][0] }}"

    - name: Install K3s Agent (on all other hosts)
      ansible.builtin.shell: |
        set -o pipefail
        curl -sfL https://get.k3s.io | \
        K3S_URL="https://{{ hostvars[groups['k3s_servers'][0]]['ansible_host'] }}:6443" \
        K3S_TOKEN="{{ k3s_token_base64.content | b64decode | trim }}" \
        INSTALL_K3S_EXEC="agent --node-ip=$(tailscale ip -4) --flannel-iface=tailscale0" \
        sh -s -
      args:
        creates: /etc/systemd/system/k3s-agent.service

- name: Configure control node and fetch kubeconfig
  hosts: k3s_servers
  become: true
  run_once: true
  tasks:
    - name: Installing kubectl on control node
      delegate_to: localhost
      block:
        - name: Check if kubectl is already installed
          ansible.builtin.command: kubectl version --client
          register: kubectl_exists
          ignore_errors: true
          changed_when: false

        - name: Ask user if they want to install kubectl
          ansible.builtin.pause:
            prompt: |
              kubectl is not installed on control node
              Would you like to install kubectl now?
              Enter (y or yes) to continue
              NOTE: Only works on Linux systems
          register: user_confirmation
          when:
            - kubectl_exists.rc != 0
            - ansible_system == "Linux"

        - name: Try to install kubectl via system package manager
          ansible.builtin.package:
            name: kubectl
            state: present
          register: pkg_result
          ignore_errors: true
          when:
            - kubectl_exists.rc != 0
            - user_confirmation.user_input | default('') | lower in ['y', 'yes']

        - name: Fetch latest stable version
          ansible.builtin.uri:
            url: https://dl.k8s.io/release/stable.txt
            return_content: true
          register: kubectl_version

        - name: Download the latest kubectl binary
          ansible.builtin.get_url:
            url: "https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/amd64/kubectl"
            dest: "/tmp/kubectl"
            mode: '0755'
          when:
            - kubectl_exists.rc != 0
            - pkg_result is failed or pkg_result is skipped
            - user_confirmation.user_input | default('') | lower in ['y', 'yes']

        - name: Download checksum and verify kubectl binary
          ansible.builtin.get_url:
            url: "https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/amd64/kubectl"
            dest: /usr/local/bin/kubectl
            mode: '0755'
            checksum: "sha256:https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/amd64/kubectl.sha256"
          register: kubectl_download
          when:
            - kubectl_exists.rc != 0
            - pkg_result is failed or pkg_result is skipped
            - user_confirmation.user_input | default('') | lower in ['y', 'yes']

        - name: Move kubectl to /usr/local/bin
          ansible.builtin.copy:
            src: "/tmp/kubectl"
            dest: "/usr/local/bin/kubectl"
            mode: '0755'
            owner: root
            group: root
            remote_src: true
          when:
            - kubectl_exists.rc != 0
            - pkg_result is failed or pkg_result is skipped
            - kubectl_download is succeeded
            - user_confirmation.user_input | default('') | lower in ['y', 'yes']

        - name: Ensure required Ansible collections are installed
          delegate_to: localhost
          ansible.builtin.command: "ansible-galaxy collection install {{ item }}"
          args:
            creates: "~/.ansible/collections/ansible_collections/{{ item | replace('.', '/') }}"
          loop:
            - kubernetes.core
            - containers.podman

        - name: Ensure podman is installed on Fedora control node
          delegate_to: localhost
          ansible.builtin.package:
            name: podman
            state: present

    - name: Fetch and localize Kubeconfig
      block:
        - name: Ensure local .kube directory exists
          ansible.builtin.file:
            path: "~/.kube"
            state: directory
            mode: '0700'
          delegate_to: localhost

        - name: Check if local kubeconfig already exists
          ansible.builtin.stat:
            path: "~/.kube/config"
          register: kubeconfig_check
          delegate_to: localhost

        - name: Warning and overwrite confirmation
          ansible.builtin.pause:
            prompt: |
                WARNING: ~/.kube/config already exists on your control device
                Fetching the new config will OVERWRITE any current cluster configurations
                Press ENTER to continue and overwrite or Ctrl+C then 'A' to abort.
          when: kubeconfig_check.stat.exists
          delegate_to: localhost

        - name: Fetch K3s config from host
          ansible.builtin.fetch:
            src: /etc/rancher/k3s/k3s.yaml
            dest: "~/.kube/config"
            flat: true

        - name: Update server address to mDNS
          ansible.builtin.replace:
            path: "{{ lookup('env', 'HOME') }}/.kube/config"
            regexp: '127.0.0.1'
            replace: "{{ inventory_hostname }}"
          delegate_to: localhost
